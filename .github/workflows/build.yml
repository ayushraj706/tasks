name: Build Tasks
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Java 17 ki jagah 21 zaroori hai
          distribution: 'zulu' # Tasks ke liye Zulu distribution best hai
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Android F-Droid Debug APK
        # Hum specifically ':app:assembleFdroidDebug' use karenge
        run: ./gradlew :app:assembleFdroidDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tasks-Fdroid-APK
          path: "app/build/outputs/apk/fdroid/debug/*.apk"
          

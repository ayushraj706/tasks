name: Build Tasks
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Android Debug APK
        # Tasks mein hum specifically 'googleplayDebug' ya 'fdroidDebug' build kar sakte hain
        run: ./gradlew :app:assembleFdroidDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tasks-APK
          path: "app/build/outputs/apk/fdroid/debug/*.apk"
          

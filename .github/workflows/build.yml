name: Build Tasks (Ayush Edition)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Tasks ke liye Java 21 hona bahut zaroori hai
          distribution: 'zulu'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build F-Droid Debug APK
        # Hum sirf mobile app (:app) build karenge taaki time bache
        run: ./gradlew :app:assembleFdroidDebug --no-daemon

      - name: Upload Tasks APK
        uses: actions/upload-artifact@v4
        with:
          name: Tasks-Fdroid-APK
          path: "app/build/outputs/apk/fdroid/debug/*.apk"
          

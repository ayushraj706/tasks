name: Build Tasks Ayush Edition
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Mobile APK
        # Yahan humne ':app' ko badal kar ':composeApp' kar diya hai
        # Aur flavor check karne ke liye 'assembleDebug' use karenge
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tasks-Mobile-APK
          path: "**/build/outputs/apk/**/*.apk"
          
